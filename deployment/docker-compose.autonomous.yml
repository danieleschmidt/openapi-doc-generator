"""
Autonomous SDLC Docker Compose - Production Ready
Multi-service deployment with all autonomous components
"""

version: '3.8'

networks:
  autonomous-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  logs-data:
    driver: local

services:
  # Main Autonomous SDLC Service
  autonomous-sdlc:
    build:
      context: ..
      dockerfile: Dockerfile.autonomous
    image: openapi-doc-generator:autonomous-latest
    container_name: autonomous-sdlc-main
    hostname: autonomous-sdlc
    restart: unless-stopped
    ports:
      - "8000:8000"  # Main API
      - "8080:8080"  # Metrics
      - "9000:9000"  # Health checks
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - AUTONOMOUS_FEATURES_ENABLED=true
      - QUANTUM_OPTIMIZATION_ENABLED=true
      - AI_DOCUMENTATION_ENABLED=true
      - SECURITY_GUARDIAN_ENABLED=true
      - RELIABILITY_ENGINE_ENABLED=true
      - PERFORMANCE_ENGINE_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://autonomous:secure_password@postgres:5432/autonomous_sdlc
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_URL=http://grafana:3000
      - GLOBAL_DEPLOYMENT_REGION=us-east-1
      - COMPLIANCE_REQUIREMENTS=GDPR,CCPA,SOX,ISO27001
      - PERFORMANCE_TARGET_LATENCY=50ms
      - CACHE_SIZE_MB=500
      - MAX_WORKERS=8
      - QUANTUM_TEMPERATURE=2.0
    volumes:
      - ./config:/app/config:ro
      - logs-data:/app/logs
      - /tmp:/tmp
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.10
    depends_on:
      - redis
      - postgres
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=500m
      - /app/tmp:noexec,nosuid,size=200m

  # Load Balancer
  nginx:
    image: nginx:alpine
    container_name: autonomous-sdlc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/ssl/certs:ro
      - logs-data:/var/log/nginx
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.5
    depends_on:
      - autonomous-sdlc
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: autonomous-sdlc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --timeout 60
      --tcp-keepalive 300
    volumes:
      - redis-data:/data
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.20
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: autonomous-sdlc-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=autonomous_sdlc
      - POSTGRES_USER=autonomous
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_INITDB_ARGS=--auth-host=md5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.25
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autonomous -d autonomous_sdlc"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: autonomous-sdlc-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.30
    depends_on:
      - autonomous-sdlc
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: autonomous-sdlc-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=autonomous_admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.35
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Jaeger Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: autonomous-sdlc-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # HTTP collector
      - "14250:14250"  # gRPC collector
    environment:
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.40
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ElasticSearch for Logs
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: autonomous-sdlc-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.45
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Kibana for Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: autonomous-sdlc-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.50
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Filebeat for Log Shipping
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: autonomous-sdlc-filebeat
    restart: unless-stopped
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - logs-data:/var/log/autonomous:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.55
    depends_on:
      - elasticsearch
    command: filebeat -e -strict.perms=false

  # Security Scanner
  security-scanner:
    image: owasp/zap2docker-stable
    container_name: autonomous-sdlc-security
    restart: "no"
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.60
    depends_on:
      - autonomous-sdlc
    command: >
      zap-full-scan.py
      -t http://autonomous-sdlc:8000
      -r security-report.html
      -J security-report.json
    volumes:
      - ./security-reports:/zap/wrk:rw

  # Performance Testing
  performance-tester:
    image: loadimpact/k6
    container_name: autonomous-sdlc-k6
    restart: "no"
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.65
    depends_on:
      - autonomous-sdlc
    volumes:
      - ./k6-tests:/scripts:ro
      - ./performance-reports:/reports:rw
    command: >
      run
      --out json=/reports/performance-results.json
      --summary-export=/reports/performance-summary.json
      /scripts/load-test.js

  # Backup Service
  backup-service:
    image: postgres:15-alpine
    container_name: autonomous-sdlc-backup
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=autonomous_sdlc
      - POSTGRES_USER=autonomous
      - POSTGRES_PASSWORD=secure_password
      - BACKUP_SCHEDULE=0 2 * * *
    volumes:
      - ./backups:/backups
      - ./backup-scripts:/scripts:ro
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.70
    depends_on:
      - postgres
    command: >
      sh -c "
      echo '${BACKUP_SCHEDULE} /scripts/backup.sh' | crontab - &&
      crond -f
      "

  # Health Check Service
  healthcheck-service:
    image: alpine/curl
    container_name: autonomous-sdlc-healthcheck
    restart: unless-stopped
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.75
    depends_on:
      - autonomous-sdlc
      - redis
      - postgres
      - prometheus
      - grafana
    command: >
      sh -c "
      while true; do
        curl -f http://autonomous-sdlc:9000/health/deep || echo 'Health check failed';
        sleep 60;
      done
      "

  # Auto-scaling Controller (simulation)
  autoscaler:
    image: alpine
    container_name: autonomous-sdlc-autoscaler
    restart: unless-stopped
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - SCALE_UP_THRESHOLD=80
      - SCALE_DOWN_THRESHOLD=30
      - MIN_REPLICAS=2
      - MAX_REPLICAS=10
    networks:
      autonomous-network:
        ipv4_address: 172.20.0.80
    depends_on:
      - prometheus
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./autoscaler:/scripts:ro
    command: >
      sh -c "
      apk add --no-cache curl jq &&
      while true; do
        /scripts/autoscale.sh;
        sleep 30;
      done
      "

# Health check for the entire stack
x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s